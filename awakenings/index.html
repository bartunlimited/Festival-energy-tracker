// cover: indoor | covered | open · size XS-XL · dark: enclosed/dark inside
// Awakenings areas — cover flags verified by Bart (2026-07-10):
// Y = tent, B en C = dak (open zijkanten), rest = buiten.
const STAGES = {
  "area-v": { name:"Area V", cover:"open",    size:"XL", dark:false, verified:true, fit:0.8, lightshow:true },  // main
  "area-a": { name:"Area A", cover:"open",    size:"M",  dark:false, verified:true },

  "area-x": { name:"Area X", cover:"open",    size:"L",  dark:false, verified:true },
  "area-y": { name:"Area Y", cover:"covered", size:"M",  dark:true,  verified:true },  // tent
};

// Heuristic energy 0-100 (genre + set type + familiarity + reputation).
const ARTISTS = {
  "999999999": { energy:84, note:"live hard techno chaos" },
  "Adriatique": { energy:66 },
  "Bad Boombox": { energy:68, note:"fun rave energy" },
  "Bart Skils": { energy:75 },
  "Ben Klock": { energy:85, note:"Berghain resident" },

  "Chris Avantgarde": { energy:68 },

  "EASTTOWN": { energy:60 },
  "Eli Brown & HI-LO": { energy:82, note:"rave anthems b2b" },
  "Franky Rizardo": { energy:70 },
  "Freddy K": { energy:80, note:"relentless" },
  "IGNEZ": { energy:73 },
  "Innellea": { energy:63 },
  "Joëlla Jackson": { energy:63 },
  "Julia Maria": { energy:70 },
  "Julya Karma": { energy:58 },
  "Kaufmann": { energy:64 },
  "Lammer": { energy:64 },
  "Lisa Korver": { energy:60 },
  "Lucky Done Gone": { energy:62 },
  "Marco Carola": { energy:78, note:"tech house legende" },
  "Mau P": { energy:76, note:"driving tech house" },
  "MCR-T & Partiboi69": { energy:78, note:"party chaos, iedereen los" },
  "Mha Iri": { energy:68 },
  "NIKOLINA": { energy:76 },
  "Nina Kraviz": { energy:81, note:"eigenzinnig, grote naam" },
  "NOVAH": { energy:78 },
  "Pan-Pot": { energy:78, note:"Berlijn duo, betrouwbaar hard" },
  "Richie Hawtin": { energy:78, note:"techno pionier" },
  "SAMOH (live)": { energy:55, note:"live melodic, kijkers" },
  "Toman": { energy:68, note:"NL groove" },
  "ØTTA": { energy:75, note:"hypnotisch, kenners-floor" },
};

const CONFIG = {
  weights: { artist:0.40, slot:0.25, stage:0.20, competition:0.15 },
  // timeslot curve in festival-hour space (hours <06:00 => +24)
  slotCurve: [ [12,15,0.35],[15,17,0.50],[17,19,0.65],[19,21,0.80],[21,24,1.00],[24,25,0.90],[25,30,0.85],[6,12,0.30] ],
  darkSlotFloor: 0.7,          // dark/indoor stages: S = max(S, floor)
  rain: { threshMm:0.3, heavyMm:2.0, lookaheadMin:60, soonMin:45, moveByBufferMin:15 },
  cold: { tempC:19, fromHour:19, penalty:0.10 },   // open stages, cold evening (<19° per Bart)
  sun:  { tempC:20, maxCloud:60, openBonus:1.05, melodicOpenBonus:1.10 },  // mooi weer (warm + zon): buiten leeft, zeker melodic/house (Bart)
  heat: { tempC:28, openPenalty:0.85, shadeBonus:1.08 },  // te warm: schaduw onder afdak (bv. Crystal Garden) wint van open weide (Bart)
  lightshow: { fromHour:22.5, bonus:0.15, closingBonus:0.05 }, // na donker: lichtshow-stages aantrekkelijker, closing extra (Bart)
  weather: {
    lat:51.523, lon:5.122, tz:"Europe/Amsterdam",
    pollMs: 10*60*1000,
    url: "https://api.open-meteo.com/v1/forecast?latitude=51.523&longitude=5.122&minutely_15=precipitation&hourly=temperature_2m,precipitation_probability,precipitation,cloud_cover&forecast_days=2&timezone=Europe%2FAmsterdam",
  },
  energyChipMin: 70,
};

/* =====================================================================
   APP BLOCK — scoring engine (pure functions, no I/O)
   ===================================================================== */
const clamp = (v,a,b)=>Math.min(b,Math.max(a,v));

// "HH:MM" -> minutes in festival-day space (00:30 => 24h30 = 1470)
function toMin(hhmm){ const [h,m]=hhmm.split(":").map(Number); return ((h<6?h+24:h)*60)+m; }

// absolute Date for a set boundary (device runs in Europe/Brussels)
function setDate(set, which){
  const base = new Date(DAY_DATES[set.day]+"T00:00:00");
  return new Date(base.getTime() + toMin(which==="start"?set.start:set.end)*60000);
}

// festival-hour (12..30) for an absolute Date
function festHour(t){ const h = t.getHours()+t.getMinutes()/60; return h<6 ? h+24 : h; }

function slotValueAtHour(fh){
  for(const [a,b,v] of CONFIG.slotCurve) if(fh>=a && fh<b) return v;
  return 0.3;
}

// S(t): timeslot curve; dark stages get a floor (inside, daytime barely matters)
function slotValue(stage, fh){
  let s = slotValueAtHour(fh);
  if(stage && stage.dark) s = Math.max(s, CONFIG.darkSlotFloor);
  return s;
}

// G: stage fit
function stageFit(stage){
  if(!stage) return 0.75;
  if(stage.fit) return stage.fit;  // per-stage override (e.g. Mainstage)
  const covered = stage.cover==="indoor" || stage.cover==="covered";
  if(covered && stage.dark) return 1.0;
  if(covered) return 0.85;
  if(stage.size==="XL" || stage.size==="L") return 0.6;
  return 0.75;
}

// lightshow stages (Mainstage, Great Library) get extra pull after dark;
// the stage's closing set even more ("zeker closing bij Main" — Bart)
function isClosing(set){
  const s0 = toMin(set.start);
  return !TIMETABLE.some(o => o!==set && o.day===set.day && o.stage===set.stage && toMin(o.start)>s0);
}
function lightBonus(stage, set, fh){
  if(!stage || !stage.lightshow || fh < CONFIG.lightshow.fromHour) return 0;
  return CONFIG.lightshow.bonus + (isClosing(set) ? CONFIG.lightshow.closingBonus : 0);
}

// crude genre family for competition matching
function genreFam(g){
  g=(g||"").toLowerCase();
  if(/hard|rawstyle|hardstyle|industrial/.test(g)) return "hard";
  if(/melodic/.test(g)) return "melodic";
  if(/peak|techno/.test(g)) return "techno";
  if(/tech house|house/.test(g)) return "house";
  if(/trance|big room|edm|progressive|mainstage/.test(g)) return "main";
  if(/drum|dnb|d&b/.test(g)) return "dnb";
  if(/down|ambient|chill/.test(g)) return "down";
  return "other";
}

// C: competition from simultaneous same-family sets with >= artist energy
function competition(set){
  const s0=toMin(set.start), e0=toMin(set.end), fam=genreFam(set.genre);
  const myE = (ARTISTS[set.artist]?.energy ?? 50);
  let n=0;
  for(const o of TIMETABLE){
    if(o===set || o.day!==set.day) continue;
    if(genreFam(o.genre)!==fam) continue;
    const s1=toMin(o.start), e1=toMin(o.end);
    if(s1<e0 && s0<e1 && (ARTISTS[o.artist]?.energy ?? 50) >= myE) n++;
  }
  return n===0 ? 1.0 : n===1 ? 0.85 : 0.7;
}

// M_weather(t): needs weather state (wx) — pure given wx snapshot
function weatherMult(stage, t, wx, set, atSetTime){
  if(!stage) return 1;
  let m = 1;
  const r = rainStatus(t, wx);
  const wet = atSetTime ? r.raining : r.rainingOrSoon;  // set-range mode: only rain in this quarter itself
  if(wet){
    if(stage.cover==="indoor") m = 1.15;
    else if(stage.cover==="covered") m = 1.10;
    else m = r.heavy ? 0.35 : 0.55;
  }
  const temp = tempAt(t, wx);
  if(temp!=null && temp<CONFIG.cold.tempC && festHour(t)>=CONFIG.cold.fromHour && stage.cover==="open") m -= CONFIG.cold.penalty;
  if(!wet && temp!=null && temp>=CONFIG.heat.tempC){
    // too hot: shade under a roof (e.g. Crystal Garden) beats the open field
    if(stage.cover==="covered") m *= CONFIG.heat.shadeBonus;
    else if(stage.cover==="open") m *= CONFIG.heat.openPenalty;
  } else if(!wet && temp!=null && temp>=CONFIG.sun.tempC && stage.cover==="open"){
    // pleasantly warm AND actually sunny (cloud cover below threshold; unknown => assume ok)
    const cloud = cloudAt(t, wx);
    if(cloud==null || cloud < CONFIG.sun.maxCloud){
      const fam = set ? genreFam(set.genre) : "";
      m *= (fam==="melodic" || fam==="house" || fam==="down") ? CONFIG.sun.melodicOpenBonus : CONFIG.sun.openBonus;
    }
  }
  return Math.max(0, m);
}

// score(set, t). live=false => static/dry score (Dag-schema), S at set midpoint.
function scoreSet(set, t, wx, live){
  const stage = STAGES[set.stage];
  const A = (ARTISTS[set.artist]?.energy ?? 50)/100;
  const fh = live && t ? festHour(t) : (toMin(set.start)+toMin(set.end))/2/60;
  const S = slotValue(stage, fh);
  const G = Math.min(1, stageFit(stage) + lightBonus(stage, set, fh));
  const C = competition(set);
  const w = CONFIG.weights;
  const base = clamp((w.artist*A + w.slot*S + w.stage*G + w.competition*C)*100, 0, 100);
  const M = live ? weatherMult(stage, t, wx, set) : 1;
  return Math.round(clamp(base*M, 0, 100));
}

// absolute Date at the midpoint of a set (weather is evaluated at set time)
function setMid(set){
  const base = new Date(DAY_DATES[set.day]+"T00:00:00");
  return new Date(base.getTime() + (toMin(set.start)+toMin(set.end))/2*60000);
}
function hasWx(){ return wx.minutely.length>0 || wx.hourly.length>0; }

// Weather over a WHOLE set: sample every quarter-hour from start to end.
// Any bad quarter counts fully (worst wins); if nothing is bad, the best
// quarter counts (covered stages keep their rain bonus for the whole set).
function weatherMultRange(set, w){
  const stage = STAGES[set.stage];
  if(!stage) return 1;
  const s0 = setDate(set,"start").getTime(), e0 = setDate(set,"end").getTime();
  let worst = Infinity, best = -Infinity;
  for(let t = s0; t < e0; t += 15*60000){
    const m = weatherMult(stage, new Date(t), w, set, true);
    if(m < worst) worst = m;
    if(m > best) best = m;
  }
  return worst < 1 ? worst : best;
}
function scoreSetWx(set, w){
  return Math.round(clamp(scoreSet(set, null, w, false) * weatherMultRange(set, w), 0, 100));
}

function scoreBlocks(sc){
  const f = Math.round(sc/20);
  return "▮".repeat(f) + "▯".repeat(5-f);
}

/* ============================ clock module =========================== */
const params = new URLSearchParams(location.search);
const NOW_OVERRIDE = params.get("now") ? new Date(params.get("now")) : null;
function now(){ return NOW_OVERRIDE ? new Date(NOW_OVERRIDE) : new Date(); }
function fmtHM(t){ return String(t.getHours()).padStart(2,"0")+":"+String(t.getMinutes()).padStart(2,"0"); }

// which festival day is "live" at t (day runs 11:00 -> 06:00 next morning)
function festivalDay(t){
  for(const d of Object.keys(DAY_DATES).map(Number)){
    const base = new Date(DAY_DATES[d]+"T00:00:00").getTime();
    if(t.getTime() >= base+11*3600e3 && t.getTime() < base+30*3600e3) return d;
  }
  return null;
}

/* =========================== weather module ========================== */
// wx = { minutely:[{t:Date, mm}], hourly:[{t:Date, temp, prob, mm}], ts:Date|null, stale:bool }
let wx = { minutely:[], hourly:[], ts:null, stale:false };

function parseWeather(json){
  const minutely=[], hourly=[];
  if(json.minutely_15) json.minutely_15.time.forEach((tm,i)=>minutely.push({ t:new Date(tm), mm:json.minutely_15.precipitation[i] ?? 0 }));
  if(json.hourly) json.hourly.time.forEach((tm,i)=>hourly.push({
    t:new Date(tm), temp:json.hourly.temperature_2m[i],
    prob:json.hourly.precipitation_probability[i], mm:json.hourly.precipitation[i] ?? 0,
    cloud:json.hourly.cloud_cover ? json.hourly.cloud_cover[i] : null }));
  return {minutely, hourly};
}

async function fetchWeather(){
  try{
    const res = await fetch(CONFIG.weather.url);
    if(!res.ok) throw new Error("HTTP "+res.status);
    const json = await res.json();
    localStorage.setItem("few_wx", JSON.stringify({json, ts:Date.now()}));
    applyWeather(json, new Date(), false);
  }catch(e){
    const cached = localStorage.getItem("few_wx");
    if(cached){
      const {json, ts} = JSON.parse(cached);
      applyWeather(json, new Date(ts), true);
    } // else: wx stays empty -> static model only
  }
  render();
}

function applyWeather(json, ts, stale){
  const p = parseWeather(json);
  wx = { ...p, ts, stale };
  if(params.get("rain")==="demo") injectDemoRain();
}

// ?rain=demo: synthetic shower starting now+30m, 45m long, 1.2mm/15m
function injectDemoRain(){
  const t0 = now();
  const minutely=[];
  for(let m=-60; m<=180; m+=15){
    const t = new Date(t0.getTime()+m*60000);
    const inRain = m>=30 && m<75;
    minutely.push({t, mm: inRain?1.2:0});
  }
  wx.minutely = minutely;
  if(!wx.ts) wx.ts = t0;
}

function slotAt(arr, t){
  for(let i=arr.length-1;i>=0;i--) if(t>=arr[i].t) {
    // slot width: minutely 15m, hourly 60m — accept if within width
    const width = arr.length>1 ? (arr[1].t-arr[0].t) : 3600e3;
    return (t - arr[i].t) < width ? arr[i] : null;
  }
  return null;
}

// "Weer van vandaag"-mapping: when t (e.g. a simulated festival day) falls
// outside the forecast window, project today's Boom weather onto that day —
// same clock time, today's pattern. Offset is computed PER data array, so a
// synthetic ?rain=demo minutely set at sim-time still maps hourly temp/cloud.
function wxOffsetFor(arr, t){
  if(!arr.length || slotAt(arr, t)) return 0;
  const nowReal = new Date();
  const mapped = new Date(nowReal.getFullYear(), nowReal.getMonth(), nowReal.getDate(), t.getHours(), t.getMinutes());
  if(t.getHours() < 6) mapped.setDate(mapped.getDate()+1);  // na middernacht => morgenvroeg
  return mapped - t;
}

function tempAt(t, w){
  w = w||wx;
  const s = slotAt(w.hourly, new Date(t.getTime() + wxOffsetFor(w.hourly, t)));
  return s ? s.temp : null;
}
function cloudAt(t, w){
  w = w||wx;
  const s = slotAt(w.hourly, new Date(t.getTime() + wxOffsetFor(w.hourly, t)));
  return s && s.cloud!=null ? s.cloud : null;
}

function rainStatus(t, w){
  w = w||wx;
  const th = CONFIG.rain.threshMm;
  const tt = new Date(t.getTime() + wxOffsetFor(w.minutely, t));
  const cur = slotAt(w.minutely, tt);
  const raining = !!(cur && cur.mm>=th);
  let soon=false, heavy = !!(cur && cur.mm>=CONFIG.rain.heavyMm);
  for(const s of w.minutely){
    const dm = (s.t - tt)/60000;
    if(dm>0 && dm<=CONFIG.rain.soonMin && s.mm>=th){ soon=true; if(s.mm>=CONFIG.rain.heavyMm) heavy=true; }
  }
  return { raining, soon, rainingOrSoon: raining||soon, heavy };
}

// first rain event within lookahead: {start, end(Date|null), heavy}
// times are returned in t's own day (mapped back from today's pattern)
function nextRainEvent(t){
  const th=CONFIG.rain.threshMm;
  const off = wxOffsetFor(wx.minutely, t);
  const tt = new Date(t.getTime() + off);
  let start=null, end=null, heavy=false;
  for(const s of wx.minutely){
    const dm=(s.t-tt)/60000;
    if(dm<-15) continue;
    if(!start){
      if(dm<=CONFIG.rain.lookaheadMin && s.mm>=th){ start=new Date(s.t-off); heavy=s.mm>=CONFIG.rain.heavyMm; }
    }else{
      if(s.mm>=CONFIG.rain.heavyMm) heavy=true;
      if(s.mm<th){ end=new Date(s.t-off); break; }
    }
  }
  return start ? {start, end, heavy} : null;
}

/* ============================== render =============================== */
let view = "nu";
let filt = { day: festivalDay(now()) || 1, stage:"all", fromHour:13, picksOnly:false, minEnergy:false };

function setView(v){ view=v; render(); }
function el(id){ return document.getElementById(id); }
function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;"); }

function pickBadge(p){
  return p==="must" ? ' <span class="badge must">MUST</span>' : p==="rec" ? ' <span class="badge rec">TIP</span>' : "";
}
function coverBadge(st){
  if(!st) return "";
  const label = st.cover==="indoor" ? "BINNEN" : st.cover==="covered" ? "DAK" : "";
  let out = label ? ` <span class="badge cover">${label}</span>` : "";
  if(!st.verified) out += ' <span class="badge unverified">?</span>';
  return out;
}
function stageName(slug){ return STAGES[slug]?.name || slug; }

function renderBanners(){
  let html = "";
  if(DEMO_DATA) html += `<div class="banner demo">⚠️ DEMODATA — de echte W1-timetable wordt geladen zodra <b>source/tomorrowland-final2.html</b> in de repo staat.</div>`;
  if(wx.stale && wx.ts) html += `<div class="banner stale">Weer: ${fmtHM(wx.ts)} (offline — laatste bekende voorspelling)</div>`;
  if(!wx.ts && wx.minutely.length===0) html += `<div class="banner stale">Geen weerdata — statisch model actief</div>`;
  if(wxOffsetFor(wx.minutely, now()) !== 0 || wxOffsetFor(wx.hourly, now()) !== 0) html += `<div class="banner stale">Weer: patroon van vandaag (Hilvarenbeek) toegepast op deze simulatiedag</div>`;

  const t = now();
  const ev = nextRainEvent(t);
  if(ev){
    const moveBy = new Date(ev.start.getTime() - CONFIG.rain.moveByBufferMin*60000);
    const recs = coveredRecsAt(ev.start).slice(0,3);
    let lines = "";
    if(recs.length){
      const top = recs[0];
      lines += `<div class="go">Ga vóór ${fmtHM(moveBy)} naar ${esc(stageName(top.set.stage))} — ${esc(top.set.artist)} (energie ${ARTISTS[top.set.artist]?.energy ?? 50}).</div>`;
      for(const r of recs.slice(1))
        lines += `<div class="next">of: ${esc(stageName(r.set.stage))} — ${esc(r.set.artist)} (score ${r.score})</div>`;
    }
    const dur = ev.end ? ` tot ~${fmtHM(ev.end)}` : "";
    html += `<div class="banner rain">🌧 ${ev.heavy?"Zware regen":"Regen"} ~${fmtHM(ev.start)} (±15 min)${dur}.${lines}</div>`;
  }
  el("banners").innerHTML = html;
}

// covered/indoor sets playing at time t, scored at t, sorted desc
function coveredRecsAt(t){
  const d = festivalDay(t);
  if(!d) return [];
  const out=[];
  for(const set of TIMETABLE){
    if(set.day!==d) continue;
    const st = STAGES[set.stage];
    if(!st || st.cover==="open") continue;
    const s=setDate(set,"start"), e=setDate(set,"end");
    // playing at rain time, or starting shortly after
    if(s<=t && t<e || (s>t && (s-t)<=30*60000)){
      out.push({set, score: scoreSet(set, t, wx, true)});
    }
  }
  return out.sort((a,b)=>b.score-a.score);
}

function renderNu(){
  const t = now();
  const d = festivalDay(t);
  if(!d){
    const start = new Date(DAY_DATES[1]+"T13:00:00");
    const days = Math.max(0, Math.ceil((start - t)/864e5));
    const countdown = t < start
      ? `Nog <b>${days} ${days===1?"dag":"dagen"}</b> tot Awakenings.<br>Zo 12 juli vanaf 13:00.`
      : `Awakenings zit erop. 🖤`;
    el("view-nu").innerHTML = `<div class="msg">${countdown}<br><br>Alvast proefdraaien:</div>
      <div class="chips">
        <a class="chip" href="?now=2026-07-12T15:00">▶︎ Zo 15:00</a>
        <a class="chip" href="?now=2026-07-12T21:30">▶︎ Zo 21:30</a>
        <a class="chip" href="?now=2026-07-12T20:00&rain=demo">🌧 Regen-demo</a>
        <a class="chip" href="index.html">↺ Live-klok</a>
      </div>`;
    return;
  }
  const byStage = {};
  for(const set of TIMETABLE){
    if(set.day!==d) continue;
    const s=setDate(set,"start"), e=setDate(set,"end");
    const b = byStage[set.stage] ??= {current:null, next:null};
    if(s<=t && t<e) b.current = set;
    else if(s>t && (!b.next || setDate(b.next,"start")>s)) b.next = set;
  }
  const rows = Object.entries(byStage).map(([slug,b])=>({
    slug, ...b, score: b.current ? scoreSet(b.current, t, wx, true) : -1
  })).sort((a,b)=>b.score-a.score || (a.next&&b.next ? setDate(a.next,"start")-setDate(b.next,"start") : a.next?-1:1));

  let html = "";
  for(const r of rows){
    const st = STAGES[r.slug];
    let body;
    if(r.current){
      body = `<div class="art">${esc(r.current.artist)}${pickBadge(r.current.pick)}</div>
        <div class="meta">${r.current.start}–${r.current.end} · <i>${esc(r.current.genre)}</i></div>
        <div class="score">${scoreBlocks(r.score)}<b>${r.score}</b></div>`;
    }else{
      body = `<div class="meta">— geen set bezig —</div>`;
    }
    const nxt = r.next ? `<div class="next">straks ${r.next.start}: ${esc(r.next.artist)}${r.next.pick?" ★":""} · ${hasWx() ? scoreSetWx(r.next, wx) : scoreSet(r.next, null, wx, false)}</div>` : "";
    html += `<div class="nucard ${r.current?.pick||""}"><div class="stage">${esc(stageName(r.slug)).toUpperCase()}${coverBadge(st)}</div>${body}${nxt}</div>`;
  }
  el("view-nu").innerHTML = html || `<div class="msg">Geen sets vandaag.</div>`;
}

function renderSchema(){
  const inDay = new Set(TIMETABLE.filter(s=>s.day===filt.day).map(s=>s.stage));
  const stagesInDay = Object.keys(STAGES).filter(s=>inDay.has(s));
  const dayChips = Object.keys(DAY_DATES).map(Number).map(d=>
    `<button class="chip ${filt.day===d?"on":""}" onclick="filt.day=${d};render()">${DAY_LABELS[d]}</button>`).join("");
  const stageChips = [`<button class="chip ${filt.stage==="all"?"on":""}" onclick="filt.stage='all';render()">Alle</button>`]
    .concat(stagesInDay.map(s=>`<button class="chip ${filt.stage===s?"on":""}" onclick="filt.stage='${s}';render()">${esc(stageName(s))}</button>`)).join("");
  const hours=[]; for(let h=13;h<=23;h++) hours.push(h);
  const hourChips = hours.map(h=>{
    const label = h>=24 ? String(h-24).padStart(2,"0") : String(h);
    return `<button class="chip ${filt.fromHour===h?"on":""}" onclick="filt.fromHour=${h};render()">${label}</button>`;
  }).join("");
  const toggles =
    `<button class="chip toggle ${filt.picksOnly?"on":""}" onclick="filt.picksOnly=!filt.picksOnly;render()">★ picks</button>`+
    `<button class="chip toggle ${filt.minEnergy?"on":""}" onclick="filt.minEnergy=!filt.minEnergy;render()">⚡ ≥${CONFIG.energyChipMin}</button>`;

  let sets = TIMETABLE.filter(s=>s.day===filt.day)
    .filter(s=>filt.stage==="all" || s.stage===filt.stage)
    .filter(s=>toMin(s.start) >= filt.fromHour*60)
    .filter(s=>!filt.picksOnly || s.pick)
    .map(s=>({set:s, score: hasWx() ? scoreSetWx(s, wx) : scoreSet(s, null, wx, false)}))
    .filter(r=>!filt.minEnergy || r.score>=CONFIG.energyChipMin)
    .sort((a,b)=>toMin(a.set.start)-toMin(b.set.start));

  let html = `<div class="chips">${dayChips}</div><div class="chips">${stageChips}</div><div class="chips">${hourChips}</div><div class="chips">${toggles}</div>`;
  let lastStart = null;
  for(const {set,score} of sets){
    if(set.start!==lastStart){ html += `<div class="th">${set.start}</div>`; lastStart=set.start; }
    const st = STAGES[set.stage];
    html += `<div class="card ${set.pick}">
      <div class="art">${set.pick==="must"?"🔴 ":set.pick==="rec"?"🟠 ":""}${esc(set.artist)}${pickBadge(set.pick)}</div>
      <div class="meta">${set.start}–${set.end} · ${esc(stageName(set.stage))}${coverBadge(st)} · <i>${esc(set.genre)}</i></div>
      <div class="score">${scoreBlocks(score)}<b>${score}</b></div>
    </div>`;
  }
  if(!sets.length) html += `<div class="msg">Niets gevonden met deze filters.</div>`;
  el("view-schema").innerHTML = html;
}

function renderWeer(){
  const offMin = wxOffsetFor(wx.minutely, now()), offHr = wxOffsetFor(wx.hourly, now());
  const t = new Date(now().getTime() + offMin);
  const tHr = new Date(now().getTime() + offHr);
  let html = "";
  if(wx.ts) html += `<div class="sub" style="padding:8px 14px">Laatste update: ${fmtHM(wx.ts)}${wx.stale?" (offline)":""}${(offMin||offHr)?" · patroon van vandaag":""}</div>`;
  html += `<h2>NEERSLAG KOMENDE 2 UUR</h2>`;
  const slots = wx.minutely.filter(s=>{ const dm=(s.t-t)/60000; return dm>-15 && dm<=120; });
  if(slots.length){
    for(const s of slots){
      const raining = s.mm>=CONFIG.rain.threshMm;
      const bars = raining ? "▮".repeat(clamp(Math.ceil(s.mm),1,6)) : "";
      const cl = cloudAt(s.t);
      const sky = raining ? "🌧" : cl==null ? "·" : cl<25 ? "☀️" : cl<60 ? "⛅" : "☁️";
      html += `<div class="wrow"><span class="t">${fmtHM(s.t)}</span><span>${sky}</span><span class="bar">${bars}</span><span class="mm">${s.mm>0?s.mm.toFixed(1)+" mm":"droog"}</span></div>`;
    }
  } else html += `<div class="msg">Geen kwartierdata beschikbaar.</div>`;
  html += `<h2>PER UUR VANDAAG</h2>`;
  const hrs = wx.hourly.filter(s=>{ const dh=(s.t-tHr)/3600e3; return dh>-1 && dh<=18; });
  if(hrs.length){
    for(const s of hrs){
      const sky = s.mm>=CONFIG.rain.threshMm ? "🌧" : s.cloud==null ? "" : s.cloud<25 ? "☀️" : s.cloud<60 ? "⛅" : "☁️";
      html += `<div class="wrow"><span class="t">${fmtHM(s.t)}</span><span>${sky} ${Math.round(s.temp)}°</span><span class="mm">${s.prob!=null?s.prob+"%":""} ${s.mm>0?s.mm.toFixed(1)+" mm":""}</span></div>`;
    }
  } else html += `<div class="msg">Geen uurdata beschikbaar.</div>`;
  el("view-weer").innerHTML = html;
}

function render(){
  el("tab-nu").className = view==="nu"?"on":"";
  el("tab-schema").className = view==="schema"?"on":"";
  el("tab-weer").className = view==="weer"?"on":"";
  el("view-nu").style.display = view==="nu"?"":"none";
  el("view-schema").style.display = view==="schema"?"":"none";
  el("view-weer").style.display = view==="weer"?"":"none";
  el("clockline").textContent = (NOW_OVERRIDE?"SIM ":"") + fmtHM(now()) + " · " + (festivalDay(now()) ? DAY_LABELS[festivalDay(now())] : "vóór festival");
  renderBanners();
  if(view==="nu") renderNu();
  else if(view==="schema") renderSchema();
  else renderWeer();
}

/* ============================ sanity tests =========================== */
// ?test=1 — quick engine assertions in console
function runTests(){
  const get=(a)=>TIMETABLE.find(s=>s.artist===a);
  const results=[];
  const ok=(name,cond)=>results.push((cond?"✅ ":"❌ ")+name);
  ok(`36 sets geladen`, TIMETABLE.length===36);
  ok(`alle stages bekend`, TIMETABLE.every(s=>STAGES[s.stage]));
  ok(`alle artiesten hebben energie`, TIMETABLE.every(s=>ARTISTS[s.artist]));
  const cdw = scoreSet(get("Charlotte de Witte"), null, wx, false);
  const jk = scoreSet(get("Julya Karma"), null, wx, false);
  ok(`21:00 Charlotte de Witte [${cdw}] > 13:00 opener [${jk}]`, cdw>jk);
  const cyn = get("Cynthia Spiering & Reinier Zonneveld");
  const tL = new Date("2026-07-12T22:00:00");
  const rainWx = { minutely:[{t:tL, mm:1.0}], hourly:[], ts:new Date(), stale:false };
  ok(`tent (Y) stijgt bij regen`, scoreSet(cyn, tL, rainWx, true) > scoreSet(cyn, tL, {minutely:[],hourly:[]}, true));
  const rz = get("Charlotte de Witte");
  ok(`open main stort in bij regen`, scoreSet(rz, tL, {minutely:[],hourly:[]}, true) > scoreSet(rz, tL, rainWx, true));
  const cl = get("Julya Karma");
  const cls = setDate(cl,"start");
  const earlyRain = { minutely:[0,15,30].map(m=>({t:new Date(cls.getTime()+m*60000), mm:1.0})), hourly:[], ts:new Date(), stale:false };
  ok(`slechtste kwartier telt over hele set`, scoreSetWx(cl, earlyRain) < scoreSet(cl, null, wx, false));
  ok(`Area V fit-override 0.8`, stageFit(STAGES["area-v"])===0.8);
  console.log("AWK engine tests:\n"+results.join("\n"));
  if(results.some(r=>r.startsWith("❌"))) alert("Engine tests FAILED — zie console");
}

/* ============================== startup ============================== */
if(params.get("rain")==="demo") injectDemoRain();
render();
fetchWeather();
setInterval(()=>{ if(!NOW_OVERRIDE) render(); }, 60*1000);
setInterval(fetchWeather, CONFIG.weather.pollMs);
document.addEventListener("visibilitychange", ()=>{ if(document.visibilityState==="visible") fetchWeather(); });
if("serviceWorker" in navigator && location.protocol==="https:") navigator.serviceWorker.register("./sw.js");
if(params.get("test")==="1") runTests();
</script>
